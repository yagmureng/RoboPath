<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robotik Macera Adaları</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Comic Sans MS', cursive, sans-serif;
}

body{
    min-height:100vh;
    background:url("arka_plan.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
    overflow-x:hidden;
}

/* ================= HEADER ================= */
.header{
    text-align:center;
    padding:25px 15px;
    text-shadow:2px 2px 10px rgba(0,0,0,0.7);
}

.header h1{
    font-size:clamp(24px,4vw,42px);
}

.header p{
    margin-top:8px;
    font-size:clamp(14px,2vw,18px);
}

/* ================= AUTH ================= */
.auth-buttons{
    position:absolute;
    top:15px;
    right:20px;
    display:flex;
    gap:8px;
}

.auth-buttons button{
    padding:6px 14px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
    font-size:13px;
    transition:0.3s;
}

.login-btn{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
}

.register-btn{
    background:linear-gradient(45deg,#ffb347,#ffcc33);
    color:black;
}

.auth-buttons button:hover{
    transform:scale(1.08);
}

/* ================= ÜST OYUN PANELİ ================= */
.top-game-panel{
    width:85%;
    margin:10px auto 20px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    background:rgba(0,0,0,0.45);
    padding:15px 20px;
    border-radius:25px;
    backdrop-filter:blur(10px);
}

/* XP */
.xp-area{
    flex:1;
    min-width:220px;
}

.xp-container{
    width:100%;
    background:rgba(255,255,255,0.3);
    border-radius:30px;
    padding:6px;
}

.xp-bar{
    width:40%;
    height:18px;
    border-radius:30px;
    background:linear-gradient(90deg,#00ffcc,#00ccff);
}

.progress-text{
    text-align:center;
    font-size:13px;
    margin-top:5px;
}

/* PUAN */
.score-box{
    text-align:center;
    min-width:100px;
}

.score{
    font-size:22px;
    color:#00ffcc;
    text-shadow:0 0 8px #00ffcc;
}

/* JOKERLER NEON / TOOLTIP */
.jokers{
    display:flex;
    gap:12px;
}

.joker{
    position:relative;
    width:45px;
    height:45px;
    border-radius:50%;
    background:linear-gradient(145deg,#00c3ff,#00ffcc);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 0 12px #00ffcc;
    transition:0.3s;
}

.joker:hover{
    transform:scale(1.15);
    box-shadow:0 0 22px #00ffcc;
}

.joker-count{
    position:absolute;
    bottom:-4px;
    right:-4px;
    background:red;
    color:white;
    font-size:10px;
    width:16px;
    height:16px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    border:2px solid white;
}

/* Tooltip */
.tooltip{
    position:absolute;
    top:60px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.85);
    color:black;
    padding:8px 12px;
    border-radius:12px;
    font-size:13px;
    text-align:center;
    white-space:nowrap;
    opacity:0;
    transition:0.3s;
    pointer-events:none;
    z-index:99;
    box-shadow:0 0 8px rgba(0,0,0,0.4);
}

.tooltip::after{
    content:"";
    position:absolute;
    top:-6px;
    left:50%;
    transform:translateX(-50%);
    border-width:6px;
    border-style:solid;
    border-color:transparent transparent rgba(255,255,255,0.85) transparent;
}

.joker:hover .tooltip{
    opacity:1;
}

/* ================= ADALAR ================= */
.islands{
    position:relative;
    width:100%;
    max-width:1200px;
    margin:0 auto;
    height:800px;
}

.island{
    position:absolute;
    width:clamp(260px,28vw,420px);
    cursor:pointer;
    transition:0.4s;
    animation:float 3s ease-in-out infinite;
}

.island img{
    width:100%;
    border-radius:25px;
    box-shadow:0 25px 60px rgba(0,0,0,0.6);
    display:block;
}

/* Göreve Git yazısı - Beyaz */
.island::after{
    content:"Göreve Git! 🚀";
    position:absolute;
    bottom:15px;
    left:50%;
    transform:translateX(-50%) translateY(10px);
    background:rgba(0,0,0,0.5);
    color:white;
    padding:8px 15px;
    border-radius:20px;
    font-size:16px;
    font-weight:bold;
    opacity:0;
    transition:0.3s, transform 0.3s;
}

.island:hover::after{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

/* Hover efekt */
.island:hover{
    transform:scale(1.08) rotate(-2deg);
}

/* ZİKZAK ORTALANMIŞ */
#ada1{
    top:40px;
    left:20%;
}

#ada2{
    top:300px;
    right:20%;
}

#ada3{
    top:560px;
    left:25%;
}

/* YILDIZ */
.stars{
    position:absolute;
    top:-28px;
    left:50%;
    transform:translateX(-50%);
    font-size:clamp(18px,2vw,26px);
}

.star{
    color:gray;
}

.star.filled{
    color:gold;
    text-shadow:0 0 12px gold;
}

/* FLOAT ANİMASYON */
@keyframes float{
    0%{ transform: translateY(0px); }
    50%{ transform: translateY(-10px); }
    100%{ transform: translateY(0px); }
}

/* MOBİL */
@media(max-width:900px){
    .islands{
        position:static;
        height:auto;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:50px;
    }
    .island{
        position:relative;
    }
    .auth-buttons{
        position:static;
        justify-content:center;
        margin-bottom:10px;
    }
}
</style>
</head>

<body>

<div class="auth-buttons">
    <button class="login-btn">Giriş Yap</button>
    <button class="register-btn">Kayıt Ol</button>
</div>

<div class="header">
    <h1>🤖 Robotik Kodlama Macera Adaları</h1>
    <p>Görevleri tamamla, XP kazan ve Robot Ustası ol!</p>
</div>

<!-- ÜST PANEL -->
<div class="top-game-panel">

    <div class="xp-area">
        <div class="xp-container">
            <div class="xp-bar"></div>
        </div>
        <div class="progress-text">İlerleme: %40</div>
    </div>

    <div class="score-box">
        <div>🏆 Puan</div>
        <div class="score">120</div>
    </div>

    <div class="jokers">
        <div class="joker" onclick="useHint()">
            💡
            <div class="tooltip" id="hintTooltip">💡 İpucu Al<br>Kalan Hak: 1</div>
            <div class="joker-count" id="hintCount">1</div>
        </div>

        <div class="joker" onclick="useFriend()">
            👥
            <div class="tooltip" id="friendTooltip">👥 Arkadaşına Sor<br>Kalan Hak: 2</div>
            <div class="joker-count" id="friendCount">2</div>
        </div>
    </div>

</div>

<!-- ADALAR -->
<div class="islands">

    <a href="trafik_isigi.html" class="island" id="ada1">
        <div class="stars">
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
        </div>
        <img src="trafik_isigi.png">
    </a>

    <a href="otomatik_kapi.html" class="island" id="ada2">
        <div class="stars">
            <span class="star filled">★</span>
            <span class="star filled">★</span>
            <span class="star">★</span>
        </div>
        <img src="otomatik_kapi.png">
    </a>

    <a href="oda_aydinlatma.html" class="island" id="ada3">
        <div class="stars">
            <span class="star filled">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
        </div>
        <img src="oda_aydinlatma.png">
    </a>

</div>

<script>
let hintRight = 1;
let friendRight = 2;

function useHint(){
    if(hintRight > 0){
        hintRight--;
        document.getElementById("hintTooltip").innerHTML = "💡 İpucu Al<br>Kalan Hak: " + hintRight;
        document.getElementById("hintCount").innerText = hintRight;
        alert("İpucu kullanıldı!");
    }else{
        alert("İpucu hakkın bitti!");
    }
}

function useFriend(){
    if(friendRight > 0){
        friendRight--;
        document.getElementById("friendTooltip").innerHTML = "👥 Arkadaşına Sor<br>Kalan Hak: " + friendRight;
        document.getElementById("friendCount").innerText = friendRight;
        alert("Arkadaşına danıştın!");
    }else{
        alert("Arkadaşına sorma hakkın bitti!");
    }
}
</script>

</body>
</html>
